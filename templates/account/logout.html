{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👋 Sair - Saldon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700;800&display=swap">
    <style>
        :root {
            --auth-gradient: linear-gradient(135deg, #1A365D 0%, #38B2AC 100%);
        }

        body {
            background: var(--auth-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #1A365D;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 32px;
            font-size: 1rem;
        }

        .cta-button {
            background: #ef4444 !important;
            color: white !important;
            border: none !important;
            padding: 16px 48px !important;
            border-radius: 50px !important;
            font-weight: 700 !important;
            font-size: 1.1rem !important;
            width: 100% !important;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3);
            margin-top: 10px;
        }

        .cta-button:hover {
            background: #dc2626 !important;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(239, 68, 68, 0.4);
        }

        .secondary-link {
            display: block;
            margin-top: 24px;
            color: #718096;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: underline;
        }
        
        .secondary-link:hover {
            color: #1A365D;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </div>
            
            <h1>Sair do sistema?</h1>
            <p class="subtitle">Tem certeza de que deseja encerrar a sua sessão no Saldon?</p>

            <form method="POST" action="{% url 'account_logout' %}">
                {% csrf_token %}
                {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                {% endif %}
                <button type="submit" class="cta-button">Sim, quero sair</button>
            </form>

            <a href="{% url 'dashboard' %}" class="secondary-link">Cancelar e voltar ao início</a>
        </div>
    </div>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Entrar - Saldon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700;800&display=swap">
    <style>
        :root {
            --auth-gradient: linear-gradient(135deg, #1A365D 0%, #38B2AC 100%);
        }

        body {
            background: var(--auth-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: rgba(56, 178, 172, 0.1);
            color: #38B2AC;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #1A365D;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 32px;
            font-size: 1rem;
        }

        form {
            text-align: left;
        }

        label {
            font-weight: 600;
            color: #4A5568 !important;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        input {
            border-radius: 12px !important;
            padding: 12px 16px !important;
            border: 1px solid #E2E8F0 !important;
            background: #F8FAFC !important;
            margin-bottom: 20px !important;
            font-size: 1rem !important;
        }

        input:focus {
            border-color: #38B2AC !important;
            box-shadow: 0 0 0 3px rgba(56, 178, 172, 0.1) !important;
        }

        .cta-button {
            background: #38B2AC !important;
            color: white !important;
            border: none !important;
            padding: 16px 48px !important;
            border-radius: 50px !important;
            font-weight: 700 !important;
            font-size: 1.1rem !important;
            width: 100% !important;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(56, 178, 172, 0.3);
            margin-top: 10px;
        }

        .cta-button:hover {
            background: #2D9E99 !important;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(56, 178, 172, 0.4);
        }

        .secondary-link {
            display: block;
            margin-top: 24px;
            color: #38B2AC;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: underline;
        }

        .footer-links {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #EDF2F7;
            font-size: 0.85rem;
            color: #718096;
        }

        .alert-error {
            background: #FFF5F5;
            color: #C53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #FEB2B2;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            
            <h1>Acesse sua conta</h1>
            <p class="subtitle">Bem-vindo ao Saldon</p>

            {% if form.errors %}
                <div class="alert-error">
                    Email ou senha incorretos. Por favor, tente novamente.
                </div>
            {% endif %}

            <form method="POST" action="{% url 'account_login' %}">
                {% csrf_token %}
                
                <label for="id_login">Seu Email</label>
                <input type="email" name="login" placeholder="exemplo@email.com" required id="id_login" autofocus>
                
                <label for="id_password">Sua Senha</label>
                <input type="password" name="password" placeholder="••••••••" required id="id_password">

                {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                {% endif %}

                <button type="submit" class="cta-button">Entrar no sistema</button>
            </form>

            <a href="{% url 'account_signup' %}" class="secondary-link">Criar conta grátis</a>
            
            <div class="footer-links">
                <a href="{% url 'account_reset_password' %}" style="color: #718096;">Esqueci minha senha</a>
            </div>
        </div>
    </div>
</body>
</html>
